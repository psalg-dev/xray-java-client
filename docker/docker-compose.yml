version: "3.9"

# JFrog Platform — local stack
#
# Editions:
#   profile=oss  (default)  — Artifactory OSS only, no Xray. Verifies basic HTTP client connectivity.
#   profile=pro             — Artifactory Pro X + Xray + RabbitMQ. Requires a trial license.
#
# Usage:
#   OSS only:  docker compose up -d
#   Full Pro:  docker compose --profile pro up -d   (save license key to docker/artifactory.lic first)
#
# First-start takes ~3-5 min. UI at http://localhost:8082  (admin / password)

services:

  postgres:
    image: postgres:15-alpine
    container_name: jfrog-postgres
    environment:
      POSTGRES_DB: artifactory
      POSTGRES_USER: artifactory
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artifactory"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - jfrog

  artifactory:
    image: ${ARTIFACTORY_IMAGE:-releases-docker.jfrog.io/jfrog/artifactory-oss:latest}
    container_name: jfrog-artifactory
    environment:
      JF_SHARED_DATABASE_DRIVER: org.postgresql.Driver
      JF_SHARED_DATABASE_TYPE: postgresql
      JF_SHARED_DATABASE_URL: "jdbc:postgresql://postgres:5432/artifactory"
      JF_SHARED_DATABASE_USERNAME: artifactory
      JF_SHARED_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - artifactory-data:/var/opt/jfrog/artifactory
    ports:
      - "8082:8082"
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082/artifactory/api/system/ping || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 120s
    networks:
      - jfrog

  # ---------- Pro profile (requires license) ----------

  rabbitmq:
    profiles: ["pro"]
    image: rabbitmq:3.13-management-alpine
    container_name: jfrog-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - jfrog

  xray:
    profiles: ["pro"]
    image: releases-docker.jfrog.io/jfrog/xray:latest
    container_name: jfrog-xray
    environment:
      JF_SHARED_JFROGURL: http://artifactory:8082
      JF_SHARED_DATABASE_DRIVER: org.postgresql.Driver
      JF_SHARED_DATABASE_TYPE: postgresql
      JF_SHARED_DATABASE_URL: "jdbc:postgresql://postgres:5432/xray"
      JF_SHARED_DATABASE_USERNAME: xray
      JF_SHARED_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-password}
      JF_SHARED_RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    volumes:
      - xray-data:/var/opt/jfrog/xray
      - ${ARTIFACTORY_LICENSE_PATH:-/dev/null}:/artifactory_extra_conf/artifactory.lic:ro
    depends_on:
      artifactory:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8090:8090"
    networks:
      - jfrog

volumes:
  postgres-data:
  artifactory-data:
  rabbitmq-data:
  xray-data:

networks:
  jfrog:
    driver: bridge
